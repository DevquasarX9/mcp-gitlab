name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify release metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EXPECTED_REPOSITORY_URL: git+https://github.com/${{ github.repository }}.git
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_REPOSITORY_URL="$(node -p "require('./package.json').repository.url")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version ${PACKAGE_VERSION}."
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

          if [ "${PACKAGE_REPOSITORY_URL}" != "${EXPECTED_REPOSITORY_URL}" ]; then
            echo "package.json repository.url must match the GitHub repository for npm trusted publishing."
            echo "Current:  ${PACKAGE_REPOSITORY_URL}"
            echo "Expected: ${EXPECTED_REPOSITORY_URL}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Ensure version is not already published
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm run pack:dry-run

      - name: Publish to npm
        run: npm publish --access public

      - name: Verify published package
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          for attempt in 1 2 3 4 5; do
            PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}" version 2>/dev/null || true)"

            if [ "${PUBLISHED_VERSION}" = "${PACKAGE_VERSION}" ]; then
              exit 0
            fi

            echo "Waiting for npm registry to report ${PACKAGE_NAME}@${PACKAGE_VERSION} (attempt ${attempt}/5)..."
            sleep 10
          done

          echo "Published version mismatch."
          echo "Expected: ${PACKAGE_VERSION}"
          echo "Actual:   ${PUBLISHED_VERSION:-<unavailable>}"
          exit 1

      - name: Smoke test installed CLI
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PREFIX_DIR="${RUNNER_TEMP}/npm-smoke"

          npm install --global --prefix "${PREFIX_DIR}" "${PACKAGE_NAME}@${PACKAGE_VERSION}"
          test -x "${PREFIX_DIR}/bin/gitlab-mcp-server"
